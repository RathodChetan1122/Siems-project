name: SIEMS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # =====================================================
  # Backend Tests
  # =====================================================
  backend-tests:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: siems_test_db
          POSTGRES_USER: siems_test
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U siems_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test_secret_key_for_ci_pipeline_not_for_production_use_at_all
        run: mvn -B verify

      - name: Build JAR
        run: mvn -B package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: siems-backend-jar
          path: backend/target/siems-backend.jar
          retention-days: 7

  # =====================================================
  # Frontend Tests
  # =====================================================
  frontend-tests:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: siems-frontend-dist
          path: frontend/dist
          retention-days: 7

  # =====================================================
  # Docker Build (only on main branch)
  # =====================================================
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: siems-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: siems-frontend:${{ github.sha }}
          build-args: VITE_API_BASE_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
