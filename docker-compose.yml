
services:

  # =====================================================
  # PostgreSQL Database
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: siems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-siems_db}
      POSTGRES_USER: ${DB_USER:-siems_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-siems_pass}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-siems_user} -d ${DB_NAME:-siems_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - siems-network

  # =====================================================
  # Spring Boot Backend
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siems-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-docker}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-siems_db}
      DB_USER: ${DB_USER:-siems_user}
      DB_PASSWORD: ${DB_PASSWORD:-siems_pass}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B59}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - siems-network

  # =====================================================
  # React Frontend (Nginx)
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: siems-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - siems-network

networks:
  siems-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
